name: 📈 每日股市分析

on:
  # 排程執行
  schedule:
    # 台股：週一至週五 14:30 台灣時間 (06:30 UTC)
    - cron: '30 6 * * 1-5'
    # 美股：週二至週六 05:30 台灣時間 (21:30 UTC 前一天)
    - cron: '30 21 * * 1-5'

  # 手動觸發
  workflow_dispatch:
    inputs:
      market:
        description: '分析市場'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - tw
          - us

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安裝依賴
        run: pip install -r requirements.txt

      - name: 📝 建立設定檔
        run: |
          cp config/settings.example.py config/settings.py
          python -c "
          import pathlib, re
          p = pathlib.Path('config/settings.py')
          text = p.read_text()
          text = re.sub(
              r'DISCORD_WEBHOOK_URL\s*=\s*.*',
              'import os\nDISCORD_WEBHOOK_URL = os.environ.get(\"DISCORD_WEBHOOK_URL\", \"\")',
              text,
              count=1,
          )
          p.write_text(text)
          "

      - name: 💼 建立持倉設定檔
        env:
          HOLDINGS_JSON: ${{ secrets.HOLDINGS_JSON }}
        run: |
          if [ -n "$HOLDINGS_JSON" ]; then
            echo "$HOLDINGS_JSON" > config/holdings.json
          fi

      - name: 🔍 判斷分析市場
        id: market
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "market=${{ github.event.inputs.market }}" >> $GITHUB_OUTPUT
          else
            # 根據 UTC 時間判斷
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 6 ] && [ "$HOUR" -lt 12 ]; then
              echo "market=tw" >> $GITHUB_OUTPUT
            else
              echo "market=us" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 📊 執行股市分析
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python main.py --market ${{ steps.market.outputs.market }}

      - name: ✅ 完成
        run: echo "分析完成！已推播到 Discord"
